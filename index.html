<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Resolution Toolkit</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#f5f7fa; }

.header { position: sticky; top:0; background:#f5f7fa; padding:30px 20px; text-align:center; transition: all 0.3s ease; z-index:1000; }
.header.shrink { padding:10px 20px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }

.drop-area { border:2px dashed #007bff; border-radius:12px; padding:35px; background:white; cursor:pointer; transition:all 0.3s; max-width:400px; margin:auto; }
.drop-area.dragover { background:#e9f0f5; }

#downloadZipBtn {
  display:none;
  position:absolute;
  top:50%;
  right:20px;
  transform:translateY(-50%);
  padding:10px 18px;
  font-size:14px;
  font-weight:bold;
  background:#007bff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.resolution-settings { margin-top:10px; display:flex; justify-content:center; align-items:center; gap:6px; font-size:14px; }

.image-counter { margin-top:10px; font-size:13px; text-align:center; }

#fixAllBtn {
  margin-left:10px;
  padding:3px 6px;
  font-size:12px;
  border:none;
  border-radius:4px;
  background:#28a745;
  color:white;
  cursor:pointer;
}

.progress-container {
  width:250px;
  height:14px;
  background:#ddd;
  border-radius:8px;
  overflow:hidden;
  margin:8px auto;
  display:none;
}

.progress-bar {
  height:100%;
  width:0%;
  background:#007bff;
}

.container { max-width:1000px; margin:auto; padding:20px; }

.grid {
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px,1fr));
  gap:15px;
}

.image-card {
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  text-align:center;
}

.image-card img {
  max-width:100%;
  max-height:130px;
  object-fit:contain;
}

.image-name {
  font-size:10px;
  color:#999;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.image-info {
  margin-top:3px;
  font-size:12px;
  font-weight:500;
}
</style>
</head>
<body>

<div class="header">
  <h1>Image Resolution Toolkit</h1>

  <div id="dropArea" class="drop-area">
    <p><strong>Drag & Drop Images Here</strong></p>
    <span>or click to browse</span>
    <input type="file" id="imageInput" multiple accept="image/*" hidden>
  </div>

  <button id="downloadZipBtn">Download Renamed Images</button>

  <div class="resolution-settings">
    <strong>Min Resolution:</strong>
    <input type="number" id="minWidth" value="380" style="width:60px;"> ×
    <input type="number" id="minHeight" value="380" style="width:60px;">
  </div>

  <div class="image-counter">
    Total Images: <span class="total">0</span> |
    Images below min resolution: <span class="small">0</span>
    <button id="fixAllBtn" disabled>Fix Resolution</button>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<div class="container">
  <div class="grid" id="imageGrid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.0/jszip.min.js"></script>

<script>
const input = document.getElementById("imageInput");
const dropArea = document.getElementById("dropArea");
const grid = document.getElementById("imageGrid");
const downloadButton = document.getElementById("downloadZipBtn");
const minWidthInput = document.getElementById("minWidth");
const minHeightInput = document.getElementById("minHeight");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const fixAllBtn = document.getElementById("fixAllBtn");

let currentFiles = [];

dropArea.addEventListener("click", () => input.click());

input.addEventListener("change", e => {
  currentFiles = [...e.target.files];
  processFiles(currentFiles);
});

function processFiles(files) {
  grid.innerHTML = "";
  downloadButton.style.display = "none";

  const minW = parseInt(minWidthInput.value) || 0;
  const minH = parseInt(minHeightInput.value) || 0;

  let smallCount = 0;
  let loaded = 0;

  files.forEach(file => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();

      img.onload = () => {
        const tooSmall = img.width < minW || img.height < minH;
        if (tooSmall) smallCount++;

        const card = document.createElement("div");
        card.className = "image-card";

        // Store FULL original resolution
        card.dataset.originalSrc = e.target.result;

        // Create thumbnail for display only
        const canvas = document.createElement("canvas");
        const ratio = Math.min(150 / img.width, 150 / img.height, 1);
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);

        card.innerHTML = `
          <img src="${canvas.toDataURL("image/png")}">
          <div class="image-name">${file.name}</div>
          <div class="image-info" style="color:${tooSmall ? '#d9534f' : '#333'}">
            ${img.width} × ${img.height}px
          </div>
        `;

        grid.appendChild(card);

        loaded++;
        document.querySelector(".total").textContent = loaded;
        document.querySelector(".small").textContent = smallCount;
        fixAllBtn.disabled = smallCount === 0;
        downloadButton.style.display = "inline-block";
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

// Fix low resolution images
fixAllBtn.addEventListener("click", () => {
  const minW = parseInt(minWidthInput.value) || 0;
  const minH = parseInt(minHeightInput.value) || 0;

  document.querySelectorAll(".image-card").forEach(card => {
    const img = new Image();
    img.src = card.dataset.originalSrc;

    img.onload = () => {
      const ratio = Math.max(minW / img.width, minH / img.height, 1);

      if (ratio > 1) {
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);

        // Replace FULL resolution with fixed version
        card.dataset.originalSrc = canvas.toDataURL("image/png");

        card.querySelector(".image-info").textContent =
          `${canvas.width} × ${canvas.height}px`;
        card.querySelector(".image-info").style.color = "#28a745";
      }
    };
  });

  document.querySelector(".small").textContent = 0;
  fixAllBtn.disabled = true;
});

// Download ZIP WITHOUT extensions
downloadButton.addEventListener("click", async () => {
  if (!currentFiles.length) return;

  downloadButton.disabled = true;
  progressContainer.style.display = "block";

  const zip = new JSZip();
  const cards = document.querySelectorAll(".image-card");

  for (let i = 0; i < cards.length; i++) {
    const dataUrl = cards[i].dataset.originalSrc;
    const res = await fetch(dataUrl);
    const blob = await res.blob();

    // NO EXTENSION
    zip.file(`${i + 1}`, blob);

    progressBar.style.width = ((i + 1) / cards.length * 100) + "%";
  }

  const content = await zip.generateAsync({ type: "blob" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(content);
  link.download = "images_renamed.zip";
  link.click();

  downloadButton.disabled = false;
  progressContainer.style.display = "none";
  progressBar.style.width = "0%";
});
</script>

</body>
</html>
